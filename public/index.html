<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant - Delilah</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-style: italic;
        }

        .status {
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #666;
        }

        .status.listening {
            background: #e3f2fd;
            color: #1976d2;
            font-weight: bold;
        }

        .status.processing {
            background: #fff3e0;
            color: #f57c00;
            font-weight: bold;
        }

        .status.speaking {
            background: #e8f5e9;
            color: #388e3c;
            font-weight: bold;
        }

        .conversation {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
            min-height: 150px;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            line-height: 1.5;
        }

        .message.user {
            background: #e3f2fd;
            text-align: right;
            margin-left: 40px;
        }

        .message.assistant {
            background: #f3e5f5;
            text-align: left;
            margin-right: 40px;
        }

        .message-label {
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .talk-button {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            user-select: none;
        }

        .talk-button:hover {
            transform: scale(1.05);
        }

        .talk-button:active {
            transform: scale(0.95);
        }

        .talk-button.listening {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1.5s infinite;
        }

        .talk-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            }
            50% {
                box-shadow: 0 10px 50px rgba(245, 87, 108, 0.6);
            }
        }

        .reset-button {
            padding: 10px 20px;
            border: none;
            background: #e0e0e0;
            color: #666;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .reset-button:hover {
            background: #d0d0d0;
        }

        .instructions {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍳 Delilah</h1>
        <div class="subtitle">Your Southern Kitchen Assistant</div>

        <div class="status" id="status">Ready to listen</div>

        <div class="error hidden" id="error"></div>

        <div class="conversation" id="conversation">
            <div style="text-align: center; color: #999; font-style: italic;">
                Conversation will appear here...
            </div>
        </div>

        <div class="controls">
            <button class="talk-button" id="talkButton">
                Hold to<br>Talk
            </button>
        </div>

        <div style="text-align: center; margin-bottom: 20px;">
            <button class="reset-button" id="resetButton">Reset Conversation</button>
        </div>

        <div class="instructions">
            <strong>Instructions:</strong><br>
            Press and hold the button to speak<br>
            Release when you're done talking<br>
            Wait for Delilah to respond
        </div>
    </div>

    <script>
        const talkButton = document.getElementById('talkButton');
        const resetButton = document.getElementById('resetButton');
        const status = document.getElementById('status');
        const conversation = document.getElementById('conversation');
        const errorDiv = document.getElementById('error');

        let recognition;
        let isRecording = false;
        let isProcessing = false;
        let currentAudio = null;

        // Check for browser support
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            showError('Speech recognition is not supported in this browser. Please use Chrome or Edge.');
        } else {
            // Initialize speech recognition
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = async (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript;
                console.log('Recognized:', transcript);

                // Add user message to conversation
                addMessage('user', transcript);

                // Process with backend
                await processMessage(transcript);
            };

            recognition.onerror = (event) => {
                console.error('Recognition error:', event.error);
                if (event.error !== 'no-speech') {
                    showError('Speech recognition error: ' + event.error);
                }
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    stopRecording();
                }
            };
        }

        // Button event listeners
        talkButton.addEventListener('mousedown', startRecording);
        talkButton.addEventListener('mouseup', stopRecording);
        talkButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        talkButton.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });

        resetButton.addEventListener('click', resetConversation);

        function startRecording() {
            if (isProcessing || !recognition) return;

            isRecording = true;
            talkButton.classList.add('listening');
            talkButton.textContent = 'Listening...';
            status.textContent = '🎤 Listening...';
            status.className = 'status listening';
            hideError();

            try {
                recognition.start();
            } catch (error) {
                console.error('Error starting recognition:', error);
            }
        }

        function stopRecording() {
            if (!isRecording) return;

            isRecording = false;
            talkButton.classList.remove('listening');
            talkButton.textContent = 'Hold to\nTalk';

            try {
                recognition.stop();
            } catch (error) {
                console.error('Error stopping recognition:', error);
            }
        }

        async function processMessage(text) {
            isProcessing = true;
            talkButton.disabled = true;
            status.textContent = '🤔 Thinking...';
            status.className = 'status processing';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to get response');
                }

                const data = await response.json();

                // Add assistant message to conversation
                addMessage('assistant', data.text);

                // Play audio
                await playAudio(data.audio);

            } catch (error) {
                console.error('Error:', error);
                showError('Error: ' + error.message);
            } finally {
                isProcessing = false;
                talkButton.disabled = false;
                status.textContent = 'Ready to listen';
                status.className = 'status';
            }
        }

        async function playAudio(base64Audio) {
            return new Promise((resolve, reject) => {
                status.textContent = '🗣️ Speaking...';
                status.className = 'status speaking';

                // Stop any currently playing audio
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }

                const audio = new Audio('data:audio/mpeg;base64,' + base64Audio);
                currentAudio = audio;

                audio.onended = () => {
                    currentAudio = null;
                    resolve();
                };

                audio.onerror = (error) => {
                    console.error('Audio playback error:', error);
                    currentAudio = null;
                    reject(error);
                };

                audio.play().catch(reject);
            });
        }

        function addMessage(role, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'You' : 'Delilah';

            const content = document.createElement('div');
            content.textContent = text;

            messageDiv.appendChild(label);
            messageDiv.appendChild(content);

            // Clear placeholder if it exists
            if (conversation.querySelector('[style*="text-align: center"]')) {
                conversation.innerHTML = '';
            }

            conversation.appendChild(messageDiv);
            conversation.scrollTop = conversation.scrollHeight;
        }

        async function resetConversation() {
            if (!confirm('Are you sure you want to reset the conversation?')) {
                return;
            }

            try {
                await fetch('/api/reset', { method: 'POST' });
                conversation.innerHTML = '<div style="text-align: center; color: #999; font-style: italic;">Conversation will appear here...</div>';
                hideError();
            } catch (error) {
                console.error('Error resetting conversation:', error);
                showError('Failed to reset conversation');
            }
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        function hideError() {
            errorDiv.classList.add('hidden');
        }
    </script>
</body>
</html>
